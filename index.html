<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyHub</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to StudyHub</h1>
    </header>
    <main>
        <section id="auth">
            <h2>Authentication</h2>
            <form id="login-form">
                <input type="text" placeholder="Username" required>
                <input type="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
            <form id="register-form">
                <input type="text" placeholder="Username" required>
                <input type="password" placeholder="Password" required>
                <button type="submit">Register</button>
            </form>
        </section>
        <section id="study-modes">
            <h2>Study Modes</h2>
            <button id="flashcards">Flashcards</button>
            <button id="learn">Learn</button>
            <button id="test">Test</button>
        </section>
        <section id="themes">
            <h2>Themes</h2>
            <button id="dark-mode">Dark Mode</button>
            <button id="light-mode">Light Mode</button>
            <button id="eye-protection">Eye Protection Mode</button>
        </section>
        <section id="dashboard">
            <h2>Dashboard</h2>
            <p>Statistics and progress will be shown here.</p>
        </section>
    </main>
    <footer>
        <p>© 2026 StudyHub, All Rights Reserved</p>
    </footer>
    <script src="app.js"></script>
</body>
</html>
